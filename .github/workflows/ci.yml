name: CI

on:
  pull_request:
    branches:
      - dev
      - main
      - production
  push:
    branches:
      - dev
      - main
      - production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck server
        run: pnpm --filter server typecheck

      - name: Lint server
        run: pnpm --filter server lint

      - name: Build server
        run: pnpm --filter server build

  client:
    name: Client checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint client
        run: pnpm --filter client lint

      - name: Test client
        run: pnpm --filter client test -- --run

      - name: Build client
        run: pnpm --filter client build
