version: 2
updates:
  # This repository uses a pnpm workspace with one root pnpm-lock.yaml.
  # Keep Dependabot at the workspace root so dependency PRs update package.json
  # files and the shared lockfile together. Separate /client and /server jobs can
  # leave pnpm-lock.yaml stale, which breaks Vercel's frozen-lockfile install.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 6
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "dependabot"
    groups:
      client-and-server-dependencies:
        patterns:
          - "*"
